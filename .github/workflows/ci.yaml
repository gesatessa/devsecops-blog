name: Jerney CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 865274826587.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPOSITORY: jerney-backend
  FRONTEND_REPOSITORY: jerney-frontend
  AWS_GITHUB_ACTIONS_ROLE_ARN: arn:aws:iam::865274826587:role/GitHubActionsJerneyECRRole

jobs:
  lint:
    name: Lint ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.component }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run lint
        working-directory: ${{ matrix.component }}
        run: npm run lint

  docker-build:
    name: Docker build ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build image locally
        run: |
          docker build \
            -t jerney-${{ matrix.component }}:${{ github.sha }} \
            ./${{ matrix.component }}

  image-scan:
    name: Trivy scan ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: docker-build
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scan
        run: |
          docker build \
            -t jerney-${{ matrix.component }}:${{ github.sha }} \
            ./${{ matrix.component }}

      - name: Scan image
        # https://github.com/aquasecurity/trivy-action
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: jerney-${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: "0" # For demo purposes, we won't fail the build on vulnerabilities. In production, consider setting this to "1" or higher.
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  helm:
    name: Helm validate
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: |
          helm lint ./charts/jerney

      - name: Helm template
        run: |
          helm template jerney ./charts/jerney \
            -n jerney \
            -f charts/jerney/values-dev.yaml \
            --set-string externalDatabase.host=dummy.rds.amazonaws.com \
            --set-string externalSecrets.region=us-east-1 \
            > rendered.yaml

      - name: Show rendered resources
        run: |
          grep '^kind:' rendered.yaml | sort | uniq -c

  iac-scan:
    name: Checkov scan rendered Helm
    runs-on: ubuntu-latest
    needs: helm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Render Helm chart
        run: |
          helm template jerney ./charts/jerney \
            -n jerney \
            -f charts/jerney/values-dev.yaml \
            --set-string externalDatabase.host=dummy.rds.amazonaws.com \
            --set-string externalSecrets.region=us-east-1 \
            > rendered.yaml

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          # file: rendered.yaml
          directory: charts
          framework: kubernetes
          soft_fail: true

  push-images:
    name: Push images to ECR
    runs-on: ubuntu-latest
    needs:
      - image-scan
      - helm
      - iac-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build \
            -t $ECR_REGISTRY/$BACKEND_REPOSITORY:${{ github.sha }} \
            ./backend

          docker push $ECR_REGISTRY/$BACKEND_REPOSITORY:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build \
            -t $ECR_REGISTRY/$FRONTEND_REPOSITORY:${{ github.sha }} \
            ./frontend

          docker push $ECR_REGISTRY/$FRONTEND_REPOSITORY:${{ github.sha }}