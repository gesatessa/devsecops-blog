postgres:
  enabled: false
  name: jerney-pg
  image: postgres:16-alpine
  user: jerney_user
  password: jerney_pass_2026x
  database: jerney_db
  port: 5432
  storage:
    className: jerney-ebs-gp3
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

externalDatabase:
  enabled: true
  name: jerney-ext-db
  host: ""
  port: 5432
  user: jerney_user
  password: ""
  database: jerney_db
  existingSecret: jerney-ext-db-secret

storageClass:
  enabled: true
  name: jerney-ebs-gp3
  type: gp3
  encrypted: "true"
  reclaimPolicy: Retain

backend:
  name: jerney-backend
  image: 865274826587.dkr.ecr.us-east-1.amazonaws.com/jerney-backend:v1
  replicas: 1
  port: 5000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  strategy:
    type: RollingUpdate
    maxSurge: 1
    maxUnavailable: 0

frontend:
  name: jerney-frontend
  image: 865274826587.dkr.ecr.us-east-1.amazonaws.com/jerney-frontend:v2
  replicas: 1
  port: 80
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  strategy:
    type: RollingUpdate
    maxSurge: 1
    maxUnavailable: 0

