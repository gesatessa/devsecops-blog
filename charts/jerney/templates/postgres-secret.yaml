{{- if and (not .Values.externalDatabase.existingSecret) (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.externalDatabase.name }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "jerney.labels" . | indent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.externalDatabase.password | quote }}
{{- end }}