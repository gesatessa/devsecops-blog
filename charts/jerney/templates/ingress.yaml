{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "jerney.labels" . | indent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: "200-399"
    alb.ingress.kubernetes.io/actions.frontend-canary: >
      {
        "type": "forward",
        "forwardConfig": {
          "targetGroups": [
            {
              "serviceName": "{{ .Values.frontend.name }}",
              "servicePort": "{{ .Values.frontend.port }}",
              "weight": {{ .Values.canary.stableWeight }}
            },
            {
              "serviceName": "{{ .Values.frontendCanary.name }}",
              "servicePort": "{{ .Values.frontendCanary.port }}",
              "weight": {{ .Values.canary.canaryWeight }}
            }
          ],
          "targetGroupStickinessConfig": {
            "enabled": true,
            "durationSeconds": 300
          }
        }
      }
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # name: {{ .Values.frontend.name }}
                name: frontend-canary   # <-- matches `actions.frontend-canary`
                port:
                  # number: {{ .Values.frontend.port }}
                  name: use-annotation
{{- end }}