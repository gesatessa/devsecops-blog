apiVersion: v1
kind: Pod
metadata:
  name: memkill
  namespace: jerney
spec:
  restartPolicy: Never
  containers:
    - name: memkill
      image: python:3.12-alpine
      resources:
        requests:
          memory: "32Mi"
        limits:
          memory: "64Mi"
      command:
        - python
        - -c
        - |
          import time

          blocks = []
          while True:
              # Allocate 10 MiB at a time
              blocks.append(bytearray(10 * 1024 * 1024))
              print(f"Allocated ~{len(blocks) * 10} MiB")
              time.sleep(0.2)
