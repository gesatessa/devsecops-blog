apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-frontend
  namespace: jerney
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jerney-frontend
  template:
    metadata:
      labels:
        app: jerney-frontend
    spec:
      containers:
        - name: frontend
          image: 865274826587.dkr.ecr.us-east-1.amazonaws.com/jerney-frontend:v2
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: jerney-frontend
  namespace: jerney
spec:
  type: LoadBalancer
  selector:
    app: jerney-frontend
  ports:
    - port: 80
      targetPort: 80
